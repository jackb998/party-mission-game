<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Welcome - Mission Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .navbar {
            position: fixed;
            top: 0;
            right: 20px;
            padding: 20px 0;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 5px;
            transition: background 0.3s;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-left: 10px;
        }
        .navbar a:hover {
            background: rgba(255,255,255,0.3);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .messages {
            color: #d32f2f;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="navbar">
    <a href="{{ url_for('login') }}">🔐 Admin Login</a>
</div>

<div class="container">
    <h1>🎮 Mission Game</h1>
    
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <p>⚠️ {{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('index') }}">
        <div class="form-group">
            <label for="nameSelect">Select Your Name:</label>
            <select id="nameSelect" name="name" required>
                <option value="">-- Choose your name --</option>
                {% for person in people %}
                    <option value="{{ person }}">{{ person }}</option>
                {% endfor %}
            </select>
        </div>
        
        <button type="submit">Start Game</button>
    </form>
</div>

</body>
</html>
