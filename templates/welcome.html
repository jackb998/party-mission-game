<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome - Christmas Dinner</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
            position: relative;
        }
        
        /* Snowflakes background */
        .snowflakes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        .snowflake {
            position: absolute;
            top: -10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 20px;
            animation: fall linear infinite;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }
        
        .container {
            text-align: center;
            padding: 40px 30px;
            z-index: 10;
        }
        
        /* Christmas tree emoji */
        .tree {
            font-size: 80px;
            margin-bottom: 30px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* Main title */
        .title {
            color: white;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.3s forwards;
        }
        
        /* Subtitle */
        .subtitle {
            color: #ffd700;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 40px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.6s forwards;
        }
        
        /* Powered by */
        .powered-by {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 50px;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.9s forwards;
        }
        .powered-by span {
            color: #4fc3f7;
            font-weight: bold;
            font-size: 16px;
        }
        
        /* Continue button */
        .continue-btn {
            display: inline-block;
            padding: 18px 50px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4);
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeInUp 1s ease-out 1.2s forwards;
        }
        .continue-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(231, 76, 60, 0.5);
        }
        .continue-btn:active {
            transform: translateY(0);
        }
        
        /* Decorations */
        .decorations {
            margin-top: 40px;
            font-size: 30px;
            opacity: 0;
            animation: fadeInUp 1s ease-out 1.5s forwards;
        }
        
        /* Fade in up animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Mobile responsive */
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            .tree {
                font-size: 60px;
                margin-bottom: 25px;
            }
            .title {
                font-size: 24px;
                margin-bottom: 12px;
            }
            .subtitle {
                font-size: 20px;
                margin-bottom: 30px;
            }
            .powered-by {
                font-size: 12px;
                margin-bottom: 40px;
            }
            .powered-by span {
                font-size: 14px;
            }
            .continue-btn {
                padding: 16px 40px;
                font-size: 18px;
            }
            .decorations {
                font-size: 24px;
                margin-top: 30px;
            }
            .snowflake {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<!-- Snowflakes -->
<div class="snowflakes" id="snowflakes"></div>

<div class="container">
    <div class="tree">🎄</div>
    
    <h1 class="title">Welcome to the Christmas Dinner</h1>
    <h2 class="subtitle">Event & Game Night</h2>
    
    <p class="powered-by">Powered by <span>ALLSEAS</span></p>
    
    <a href="{{ url_for('index') }}" class="continue-btn">✨ Continue ✨</a>
    
    <div class="decorations">
        🎅 🎁 ⭐ 🎁 🎅
    </div>
</div>

<script>
// Create snowflakes
function createSnowflakes() {
    const container = document.getElementById('snowflakes');
    const snowflakeChars = ['❄', '❅', '❆', '✦', '✧'];
    
    for (let i = 0; i < 30; i++) {
        const snowflake = document.createElement('div');
        snowflake.className = 'snowflake';
        snowflake.textContent = snowflakeChars[Math.floor(Math.random() * snowflakeChars.length)];
        snowflake.style.left = Math.random() * 100 + '%';
        snowflake.style.animationDuration = (Math.random() * 5 + 5) + 's';
        snowflake.style.animationDelay = Math.random() * 5 + 's';
        snowflake.style.opacity = Math.random() * 0.6 + 0.2;
        snowflake.style.fontSize = (Math.random() * 15 + 10) + 'px';
        container.appendChild(snowflake);
    }
}

createSnowflakes();
</script>

</body>
</html>
