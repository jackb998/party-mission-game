<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            transition: background 0.8s ease;
        }

        /* Theme backgrounds */
        body.theme-christmas {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        body.theme-birthday {
            background: linear-gradient(135deg, #ff6b9d 0%, #c44dff 50%, #6e3aff 100%);
        }
        body.theme-halloween {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d1b4e 50%, #0d0d0d 100%);
        }
        body.theme-party {
            background: linear-gradient(135deg, #00c9ff 0%, #92fe9d 50%, #00c9ff 100%);
        }

        /* Particles background */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            top: -10px;
            font-size: 20px;
            animation: fall linear infinite;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }

        .container {
            text-align: center;
            padding: 40px 30px;
            z-index: 10;
        }

        /* Theme icon */
        .theme-icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Main title */
        .title {
            color: white;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.3s forwards;
        }

        /* Subtitle */
        .subtitle {
            color: #ffd700;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.6s forwards;
            transition: color 0.5s ease;
        }

        /* Theme selector */
        .theme-selector {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 35px;
            flex-wrap: wrap;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.9s forwards;
        }
        .theme-btn {
            padding: 10px 18px;
            font-size: 15px;
            font-weight: bold;
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 30px;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            color: white;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        .theme-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px);
        }
        .theme-btn.active {
            border-color: #ffd700;
            background: rgba(255,215,0,0.2);
            box-shadow: 0 0 15px rgba(255,215,0,0.3);
        }

        /* Curated by */
        .curated-by {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeInUp 1s ease-out 1.0s forwards;
            letter-spacing: 1px;
        }
        .curated-by span {
            color: rgba(255,255,255,0.85);
            font-weight: bold;
            font-size: 14px;
        }

        /* Continue button */
        .continue-btn {
            display: inline-block;
            padding: 18px 50px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeInUp 1s ease-out 1.2s forwards;
        }
        .continue-btn:hover {
            transform: translateY(-3px);
        }
        .continue-btn:active {
            transform: translateY(0);
        }

        /* Theme-specific button colors */
        body.theme-christmas .continue-btn {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4);
        }
        body.theme-birthday .continue-btn {
            background: linear-gradient(135deg, #ff6b9d 0%, #c44dff 100%);
            box-shadow: 0 8px 25px rgba(196, 77, 255, 0.4);
        }
        body.theme-halloween .continue-btn {
            background: linear-gradient(135deg, #ff6a00 0%, #ee0979 100%);
            box-shadow: 0 8px 25px rgba(255, 106, 0, 0.4);
        }
        body.theme-party .continue-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        /* Decorations */
        .decorations {
            margin-top: 40px;
            font-size: 30px;
            opacity: 0;
            animation: fadeInUp 1s ease-out 1.5s forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile responsive */
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            .theme-icon {
                font-size: 60px;
                margin-bottom: 25px;
            }
            .title {
                font-size: 24px;
                margin-bottom: 12px;
            }
            .subtitle {
                font-size: 20px;
                margin-bottom: 25px;
            }
            .theme-selector {
                gap: 8px;
                margin-bottom: 25px;
            }
            .theme-btn {
                padding: 8px 14px;
                font-size: 13px;
            }
            .curated-by {
                font-size: 11px;
                margin-bottom: 30px;
            }
            .continue-btn {
                padding: 16px 40px;
                font-size: 18px;
            }
            .decorations {
                font-size: 24px;
                margin-top: 30px;
            }
            .particle {
                font-size: 16px;
            }
        }
    </style>
</head>
<body class="theme-party">

<div class="particles" id="particles"></div>

<div class="container">
    <div class="theme-icon" id="themeIcon">🎉</div>

    <h1 class="title">Mission Game</h1>
    <h2 class="subtitle" id="subtitle">Event & Game Night</h2>

    <div class="theme-selector">
        <button class="theme-btn" data-theme="christmas" onclick="setTheme('christmas')">🎄 Christmas</button>
        <button class="theme-btn" data-theme="birthday" onclick="setTheme('birthday')">🎂 Birthday</button>
        <button class="theme-btn" data-theme="halloween" onclick="setTheme('halloween')">🎃 Halloween</button>
        <button class="theme-btn active" data-theme="party" onclick="setTheme('party')">🎉 Party</button>
    </div>

    <p class="curated-by">Curated by <span>JB</span></p>

    <a href="{{ url_for('index') }}" class="continue-btn" id="continueBtn">Continue</a>

    <div class="decorations" id="decorations">
        🎉 🥳 🎊 🥳 🎉
    </div>
</div>

<script>
const themes = {
    christmas: {
        icon: '🎄',
        subtitle: 'Christmas Game Night',
        subtitleColor: '#ffd700',
        decorations: '🎅 🎁 ⭐ 🎁 🎅',
        particles: ['❄', '❅', '❆', '✦', '✧'],
        particleColor: 'rgba(255, 255, 255, 0.6)'
    },
    birthday: {
        icon: '🎂',
        subtitle: 'Birthday Game Night',
        subtitleColor: '#ffb6d9',
        decorations: '🎈 🎁 🎊 🎁 🎈',
        particles: ['🎈', '✨', '🎊', '⭐', '💫'],
        particleColor: 'rgba(255, 182, 217, 0.7)'
    },
    halloween: {
        icon: '🎃',
        subtitle: 'Halloween Game Night',
        subtitleColor: '#ff8c00',
        decorations: '👻 🦇 💀 🦇 👻',
        particles: ['🦇', '👻', '🕷', '✦', '💀'],
        particleColor: 'rgba(255, 140, 0, 0.6)'
    },
    party: {
        icon: '🎉',
        subtitle: 'Event & Game Night',
        subtitleColor: '#ffd700',
        decorations: '🎉 🥳 🎊 🥳 🎉',
        particles: ['🎉', '✨', '🎊', '⭐', '💫'],
        particleColor: 'rgba(146, 254, 157, 0.7)'
    }
};

let currentTheme = localStorage.getItem('gameTheme') || 'party';

function setTheme(themeName) {
    currentTheme = themeName;
    localStorage.setItem('gameTheme', themeName);
    const theme = themes[themeName];

    // Update body class
    document.body.className = 'theme-' + themeName;

    // Update icon
    document.getElementById('themeIcon').textContent = theme.icon;

    // Update subtitle
    const subtitle = document.getElementById('subtitle');
    subtitle.textContent = theme.subtitle;
    subtitle.style.color = theme.subtitleColor;

    // Update decorations
    document.getElementById('decorations').textContent = theme.decorations;

    // Update active button
    document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.theme === themeName);
    });

    // Recreate particles
    createParticles();
}

function createParticles() {
    const container = document.getElementById('particles');
    container.innerHTML = '';
    const theme = themes[currentTheme];

    for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.textContent = theme.particles[Math.floor(Math.random() * theme.particles.length)];
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDuration = (Math.random() * 5 + 5) + 's';
        particle.style.animationDelay = Math.random() * 5 + 's';
        particle.style.opacity = Math.random() * 0.6 + 0.2;
        particle.style.fontSize = (Math.random() * 15 + 10) + 'px';
        container.appendChild(particle);
    }
}

// Initialize with saved theme
setTheme(currentTheme);
</script>

</body>
</html>
