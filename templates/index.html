<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Join - Mission Game</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .navbar {
            position: fixed;
            top: 0;
            right: 10px;
            padding: 15px 0;
            z-index: 100;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            padding: 10px 15px;
            border-radius: 5px;
            transition: background 0.3s;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-left: 5px;
        }
        .navbar a:hover {
            background: rgba(255,255,255,0.3);
        }
        .container {
            background: white;
            padding: 30px 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            margin-top: 50px;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        .input-row {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .add-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            white-space: nowrap;
        }
        .add-btn:hover {
            transform: translateY(-2px);
        }
        .add-btn:active {
            transform: translateY(0);
        }

        /* Player list */
        .player-list {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
        }
        .player-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: #f8f9ff;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 15px;
            color: #333;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .player-list li .player-name {
            font-weight: bold;
        }
        .player-list li .remove-btn {
            background: none;
            border: none;
            color: #d32f2f;
            font-size: 18px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: background 0.2s;
            width: auto;
        }
        .player-list li .remove-btn:hover {
            background: rgba(211, 47, 47, 0.1);
        }
        .player-count {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .start-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .start-btn:hover {
            transform: translateY(-2px);
        }
        .start-btn:active {
            transform: translateY(0);
        }
        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .messages {
            color: #d32f2f;
            text-align: center;
            margin-bottom: 20px;
        }
        .divider {
            border: none;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }

        /* Mobile responsive */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 25px 15px;
                margin-top: 60px;
                border-radius: 8px;
            }
            h1 {
                font-size: 24px;
                margin-bottom: 25px;
            }
            input[type="text"] {
                font-size: 16px;
                padding: 14px 12px;
            }
            .add-btn, .start-btn {
                font-size: 18px;
                padding: 14px;
            }
            label {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <a href="{{ url_for('login') }}">🔐 Admin Login</a>
</div>

<div class="container">
    <h1>🎮 Mission Game</h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <p>⚠️ {{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <div class="form-group">
        <label for="nameInput">Enter your name:</label>
        <div class="input-row">
            <input type="text" id="nameInput" placeholder="Your name..." autocomplete="off">
            <button type="button" class="add-btn" id="addBtn">Add</button>
        </div>
    </div>

    <hr class="divider">

    <p class="player-count" id="playerCount">No players yet</p>
    <ul class="player-list" id="playerList"></ul>

    <form method="POST" action="{{ url_for('index') }}" id="startForm">
        <input type="hidden" name="name" id="selectedName" value="">
        <button type="submit" class="start-btn" id="startBtn" disabled>Start Game</button>
    </form>
</div>

<script>
const players = JSON.parse(localStorage.getItem('gamePlayers') || '[]');
const nameInput = document.getElementById('nameInput');
const addBtn = document.getElementById('addBtn');
const playerList = document.getElementById('playerList');
const playerCount = document.getElementById('playerCount');
const startBtn = document.getElementById('startBtn');
const selectedName = document.getElementById('selectedName');

function savePlayers() {
    localStorage.setItem('gamePlayers', JSON.stringify(players));
}

function renderPlayers() {
    playerList.innerHTML = '';
    players.forEach((name, i) => {
        const li = document.createElement('li');
        li.innerHTML = `
            <span class="player-name">${name}</span>
            <button type="button" class="remove-btn" onclick="removePlayer(${i})">✕</button>
        `;
        li.style.cursor = 'pointer';
        li.addEventListener('click', (e) => {
            if (e.target.classList.contains('remove-btn')) return;
            selectPlayer(name);
        });
        playerList.appendChild(li);
    });

    if (players.length === 0) {
        playerCount.textContent = 'No players yet';
        startBtn.disabled = true;
        selectedName.value = '';
    } else {
        playerCount.textContent = players.length + ' player' + (players.length > 1 ? 's' : '') + ' — tap a name to play';
        startBtn.disabled = !selectedName.value;
    }
}

function selectPlayer(name) {
    selectedName.value = name;
    startBtn.disabled = false;
    startBtn.textContent = 'Start Game as ' + name;

    // Highlight selected
    document.querySelectorAll('.player-list li').forEach(li => {
        const playerName = li.querySelector('.player-name').textContent;
        if (playerName === name) {
            li.style.background = '#e8eaff';
            li.style.borderLeft = '3px solid #667eea';
        } else {
            li.style.background = '#f8f9ff';
            li.style.borderLeft = 'none';
        }
    });
}

function addPlayer() {
    const name = nameInput.value.trim();
    if (!name) return;
    if (players.includes(name)) {
        nameInput.style.borderColor = '#d32f2f';
        setTimeout(() => nameInput.style.borderColor = '#ddd', 1500);
        return;
    }
    players.push(name);
    savePlayers();
    nameInput.value = '';
    nameInput.focus();
    renderPlayers();
    // Auto-select the newly added player
    selectPlayer(name);
}

function removePlayer(index) {
    const removed = players[index];
    players.splice(index, 1);
    savePlayers();
    if (selectedName.value === removed) {
        selectedName.value = '';
        startBtn.disabled = true;
        startBtn.textContent = 'Start Game';
    }
    renderPlayers();
}

addBtn.addEventListener('click', addPlayer);
nameInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        e.preventDefault();
        addPlayer();
    }
});

// Initial render
renderPlayers();
</script>

</body>
</html>
